.b-warning{background:#FEF3C7;color:#92400E;border-color:#FDE68A}
.b-normal{background:#D1FAE5;color:#065F46;border-color:#A7F3D0}
.b-pending{background:#F1F5F9;color:#475569;border-color:#E2E8F0}
.b-inprogress{background:#DBEAFE;color:#1E40AF;border-color:#BFDBFE}
.b-completed{background:#D1FAE5;color:#065F46;border-color:#A7F3D0}
.b-overdue{background:#FEE2E2;color:#B91C1C;border-color:#FECACA}
.b-open{background:#DBEAFE;color:#1E40AF;border-color:#BFDBFE}
.b-acknowledged{background:#FEF3C7;color:#92400E;border-color:#FDE68A}
.b-resolved{background:#D1FAE5;color:#065F46;border-color:#A7F3D0}

.progress{height:6px;border-radius:3px;background:#E2E8F0;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .6s ease}
.ai-card{border:1px solid #BFDBFE;background:linear-gradient(135deg,#EFF6FF,#F0F9FF);border-radius:12px}
.conf-bar{height:8px;border-radius:4px;background:#E0F2FE;overflow:hidden}
.conf-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#3B82F6,#06B6D4)}

.modal{background:#fff;border-radius:14px;max-width:660px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}

.map-pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer}
.map-pin-dot{width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)}

.drawer-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:800}

@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

.has-tip{position:relative}

.has-tip:hover::before{content:'';position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#1E293B;z-index:999}
/* ── Map popup ── */
.map-popup{position:absolute;background:#fff;border-radius:8px;padding:8px 12px;box-shadow:0 4px 16px rgba(0,0,0,.2);border:1px solid #E2E8F0;z-index:10;min-width:150px;pointer-events:none;transform:translate(-50%,-110%)}
/* ── Role note colors ── */
.role-note-inspector{background:#F0FDF4;border-color:#A7F3D0;color:#065F46}
.role-note-supervisor{background:#FFFBEB;border-color:#FDE68A;color:#92400E}
.role-note-manager{background:#EFF6FF;border-color:#BFDBFE;color:#1D4ED8}

function generateAutoData(){
  const count=35;
  const now=new Date();
  return Array.from({length:count},(_,i)=>{
    const idx=Math.floor(Math.random()*5);
    const typeZh=AI_ZH.types[idx],typeEn=AI_EN.types[idx];
    const issuesZh=AI_ZH.issues[typeZh],issuesEn=AI_EN.issues[typeEn];
    const iIdx=Math.floor(Math.random()*issuesZh.length);
    const locIdx=Math.floor(Math.random()*AI_LOCS_ZH.length);
    const conf=parseFloat((0.60+Math.random()*0.39).toFixed(2));
    const r=Math.random();
    const sev=r<0.25?'low':r<0.60?'medium':'high';
    const d=new Date(now.getTime()-Math.random()*30*24*3600*1000);
    const p=n=>String(n).padStart(2,'0');
    const id=`DC-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${String(i+1).padStart(3,'0')}`;
    const SOURCES=['field','device','aerial','legacy'];
    const source=SOURCES[Math.floor(Math.random()*4)];
    const rIdx=Math.floor(Math.random()*AI_REASONS_ZH.length);
    const layer=LAYERS[Math.floor(Math.random()*3)];
    const ageHours=(now-d)/3600000;
    const freshness=Math.max(0,Math.min(100,Math.round(100-ageHours/7.2)));
    const completeness=Math.round(70+Math.random()*30);
    const qualityConf=Math.round(conf*100);
    return{id,assetTypeZh:typeZh,assetTypeEn:typeEn,issueTypeZh:issuesZh[iIdx],issueTypeEn:issuesEn[iIdx],
      locationZh:AI_LOCS_ZH[locIdx],locationEn:AI_LOCS_EN[locIdx],severity:sev,confidence:conf,
      uploadTime:d.toISOString(),source,layer,
      quality:{completeness,confidence:qualityConf,freshness},
      aiReasonZh:AI_REASONS_ZH[rIdx],aiReasonEn:AI_REASONS_EN[rIdx],
      decision:DECISIONS_BY_SEV[sev]};
  });
}

function aiAnalyze(){
  return new Promise(resolve=>{
    setTimeout(()=>{
      const idx=Math.floor(Math.random()*5);
      const typeZh=AI_ZH.types[idx],typeEn=AI_EN.types[idx];
      const issuesZh=AI_ZH.issues[typeZh],issuesEn=AI_EN.issues[typeEn];
      const iIdx=Math.floor(Math.random()*issuesZh.length);
      const locIdx=Math.floor(Math.random()*AI_LOCS_ZH.length);
      const conf=parseFloat((0.78+Math.random()*0.19).toFixed(2));
      const r=Math.random();
      const sev=r<0.20?'low':r<0.58?'medium':'high';
      resolve({assetTypeZh:typeZh,assetTypeEn:typeEn,issueTypeZh:issuesZh[iIdx],issueTypeEn:issuesEn[iIdx],severity:sev,locationZh:AI_LOCS_ZH[locIdx],locationEn:AI_LOCS_EN[locIdx],confidence:conf});
    },1800+Math.random()*700);
  });
}

function genDCId(){
  const d=new Date(),p=n=>String(n).padStart(2,'0');

              style={{background:alertCount>0?'#EF4444':'#3B82F6'}}>{unread}</span>
          )}
          {showNotif&&<NotifPanel onClose={()=>setShowNotif(false)}/>}
        </div>
        <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold" style={{background:'#2563EB'}}>{t.user.name.charAt(0)}</div>
      </div>
    </div>
  );
}

          <div className="flex gap-1 mt-2">
            {labels.map((l,i)=>(
              <div key={i} className="flex-1 text-center text-xs text-slate-400" style={{minWidth:0,fontSize:10}}>{l}</div>

              const color=r.score>=80?'#EF4444':r.score>=60?'#F59E0B':'#10B981';

function UploadPage({onReportCreated}){
  const {t,lang}=useContext(LangCtx);
  const u=t.upload;
  const [file,setFile]=useState(null);
  const [imgUrl,setImgUrl]=useState(null);
  const [desc,setDesc]=useState('');
  const [state,setState]=useState('idle');
  const [result,setResult]=useState(null);
  const [dzActive,setDzActive]=useState(false);
  const [locState,setLocState]=useState('none'); // none | getting | ok | fail
  const [location,setLocation]=useState(null);
  const fileRef=useRef();

  function getMockLoc(){
    const addrs=u.loc.mockAddr;
    const idx=Math.floor(Math.random()*addrs.length);
    return{latitude:+(30+Math.random()*10).toFixed(6),longitude:+(110+Math.random()*20).toFixed(6),address:addrs[idx],isMock:true};
  }
  function handleGetLocation(){
    setLocState('getting');setLocation(null);
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        pos=>{
          const addrs=u.loc.mockAddr;
          setLocation({latitude:+pos.coords.latitude.toFixed(6),longitude:+pos.coords.longitude.toFixed(6),address:addrs[Math.floor(Math.random()*addrs.length)],isMock:false});
          setLocState('ok');
        },
        ()=>{setLocation(getMockLoc());setLocState('fail');},
        {timeout:6000}
      );
    }else{setLocation(getMockLoc());setLocState('fail');}
  }

  function handleFile(f){
    if(!f||!f.type.startsWith('image/'))return;
    setFile(f);setImgUrl(URL.createObjectURL(f));setState('idle');setResult(null);
  }
  async function handleAnalyze(){
    if(!file)return;
    setState('analyzing');
    const r=await aiAnalyze();
    setResult(r);setState('done');
  }
  function handleGenReport(){
    const sev=result.severity;
    const report={
      id:genReportId(),assetId:'AST-NEW',
      assetNameZh:result.assetTypeZh+'巡检点',assetNameEn:result.assetTypeEn+' Inspection Point',
      assetTypeZh:result.assetTypeZh,assetTypeEn:result.assetTypeEn,
      issueTypeZh:result.issueTypeZh,issueTypeEn:result.issueTypeEn,
      severity:sev,locationZh:result.locationZh,locationEn:result.locationEn,confidence:result.confidence,
      recommendation:{zh:t.rec[sev],en:I18N.en.rec[sev]},
      note:{zh:desc||'（无备注）',en:desc||'(No notes)'},
      imageUrl:imgUrl,hasPhoto:!!imgUrl,createdAt:new Date().toISOString(),status:'open',staffKey:'ZW',
      mapX:20+Math.random()*60,mapY:20+Math.random()*60,
      gpsLocation:location||null,
    };
    onReportCreated(report);
  }
  const sevColor={high:'#EF4444',medium:'#F59E0B',low:'#10B981'};

  return(
    <div className="p-6">
      <div className="max-w-2xl mx-auto space-y-5">
        <div className="rounded-xl p-4 flex items-start gap-3" style={{background:'#EFF6FF',border:'1px solid #BFDBFE'}}>
          <span className="text-blue-500 text-lg flex-shrink-0">🤖</span>
          <div>
            <p className="text-sm font-semibold text-blue-900">{u.banner.title}</p>
            <p className="text-xs text-blue-700 mt-0.5">{u.banner.desc}</p>
          </div>
        </div>
        <div className="card p-6 space-y-5">
          <div>
            <div className="flex items-center gap-2 mb-3">
              <span className="w-6 h-6 rounded-full bg-blue-600 text-white text-xs font-bold flex items-center justify-center flex-shrink-0">1</span>
              <span className="text-sm font-semibold text-slate-800">{u.step1}</span>
            </div>
            {!imgUrl?(
              <div className={`drop-zone p-8${dzActive?' dz-active':''}`}
                onClick={()=>fileRef.current.click()}
                onDragOver={e=>{e.preventDefault();setDzActive(true);}}
                onDragLeave={()=>setDzActive(false)}
                onDrop={e=>{e.preventDefault();setDzActive(false);handleFile(e.dataTransfer.files[0]);}}>
                <div className="text-4xl mb-3">📷</div>
                <p className="text-sm font-medium text-slate-600">{u.dropzone.main}</p>
                <p className="text-xs text-slate-400 mt-1">{u.dropzone.sub}</p>
                <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={e=>handleFile(e.target.files[0])}/>
              </div>
            ):(
              <div className="relative rounded-xl overflow-hidden" style={{border:'1px solid #E2E8F0'}}>
                <img src={imgUrl} alt="preview" className="w-full object-cover" style={{maxHeight:240}}/>
                <button onClick={()=>{setFile(null);setImgUrl(null);setState('idle');setResult(null);}}
                  className="absolute top-2 right-2 w-7 h-7 rounded-full bg-white shadow flex items-center justify-center text-slate-500 text-sm font-bold"
                  style={{border:'1px solid #E2E8F0'}}>✕</button>
                <div className="absolute bottom-2 left-2 bg-white rounded-lg px-3 py-1 text-xs font-medium text-slate-700 shadow" style={{border:'1px solid #E2E8F0'}}>📎 {file.name}</div>
              </div>
            )}
          </div>
          <div>
            <div className="flex items-center gap-2 mb-3">
              <span className="w-6 h-6 rounded-full bg-blue-600 text-white text-xs font-bold flex items-center justify-center flex-shrink-0">2</span>
              <span className="text-sm font-semibold text-slate-800">{u.step2} <span className="text-slate-400 font-normal">{u.step2opt}</span></span>
            </div>
            <div className="relative">
              <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder={u.placeholder}

                style={{border:'1px solid #E2E8F0',outline:'none',minHeight:90,lineHeight:1.6}}

                onBlur={e=>e.target.style.borderColor='#E2E8F0'}/>
              <button className="absolute bottom-3 right-3 btn-ghost text-xs px-3 py-1.5">{u.voiceBtn}</button>

          </div>
          {/* ── Step 3: Location ── */}
          <div>

              <span className="w-6 h-6 rounded-full bg-blue-600 text-white text-xs font-bold flex items-center justify-center flex-shrink-0">3</span>

            </div>
            <div className="rounded-xl overflow-hidden" style={{border:'1px solid #E2E8F0'}}>
              {/* Status bar */}
              <div className="flex items-center justify-between px-4 py-3" style={{background: locState==='ok'?'#F0FDF4': locState==='fail'?'#FFFBEB':'#F8FAFC', borderBottom:'1px solid #E2E8F0'}}>
                <div className="flex items-center gap-2">
                  <span className="text-base">{locState==='ok'?'✅': locState==='fail'?'⚠️': locState==='getting'?'⏳':'📍'}</span>
                  <span className="text-xs font-semibold" style={{color: locState==='ok'?'#16A34A': locState==='fail'?'#D97706':'#64748B'}}>
                    {locState==='none'&&u.loc.statusNone}
                    {locState==='getting'&&u.loc.getting}
                    {locState==='ok'&&u.loc.statusOk}
                    {locState==='fail'&&u.loc.statusFail}
                  </span>
                </div>
                <button onClick={handleGetLocation} disabled={locState==='getting'}
                  className="btn-ghost text-xs px-3 py-1.5" style={{fontSize:12}}>
                  {locState==='none'||locState==='fail'?u.loc.getBtn: locState==='getting'?u.loc.getting:u.loc.regetBtn}

              </div>
              {/* Location data */}
              {location&&(
                <div className="p-4 space-y-3">
                  <div className="grid grid-cols-2 gap-3">
                    <div className="rounded-lg p-3" style={{background:'#F8FAFC',border:'1px solid #E2E8F0'}}>
                      <p className="text-xs text-slate-400 mb-1">{u.loc.lat}</p>
                      <p className="text-sm font-mono font-semibold text-slate-800">{location.latitude}</p>
                    </div>
                    <div className="rounded-lg p-3" style={{background:'#F8FAFC',border:'1px solid #E2E8F0'}}>
                      <p className="text-xs text-slate-400 mb-1">{u.loc.lng}</p>
                      <p className="text-sm font-mono font-semibold text-slate-800">{location.longitude}</p>
                    </div>
                  </div>
                  <div className="rounded-lg p-3" style={{background:'#EFF6FF',border:'1px solid #BFDBFE'}}>
                    <p className="text-xs text-blue-500 mb-1">📍 {u.loc.addr}</p>
                    <p className="text-sm font-medium text-slate-800">{location.address}</p>
                  </div>
                  <p className="text-xs text-slate-400">{u.loc.tip}</p>
                </div>
              )}
              {locState==='none'&&(
                <div className="px-4 py-5 text-center">
                  <p className="text-xs text-slate-400">{u.loc.tip}</p>
                </div>
              )}
            </div>
          </div>
          <button className="btn-primary w-full py-3 text-sm" disabled={!file||state==='analyzing'} onClick={handleAnalyze}>
            {state==='analyzing'?<><span className="spinner">⟳</span> {u.analyzingBtn}</>:<>{u.analyzeBtn}</>}
          </button>
        </div>
        {state==='analyzing'&&(
          <div className="card p-8 text-center fade-up">
            <div className="text-4xl spinner inline-block mb-4">⟳</div>
            <p className="text-sm font-semibold text-slate-700">{u.analyzing.title}</p>
            <p className="text-xs text-slate-400 mt-1">{u.analyzing.sub}</p>
            <div className="mt-4 space-y-2 text-xs text-slate-400">
              {u.analyzing.steps.map((s,i)=>(
                <div key={i} className="flex items-center gap-2 justify-center"><span className="spinner text-blue-400">⟳</span>{s}</div>
              ))}
            </div>
          </div>
        )}
        {state==='done'&&result&&(
          <div className="ai-card p-6 fade-up">
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-2">
                <span className="text-green-500 text-lg">✓</span>
                <span className="text-sm font-bold text-slate-900">{u.result.title}</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-xs text-slate-500">{u.result.confidence}</span>
                <span className="text-sm font-bold text-blue-700">{(result.confidence*100).toFixed(0)}%</span>
              </div>
            </div>
            <div className="conf-bar mb-5"><div className="conf-fill" style={{width:`${result.confidence*100}%`}}/></div>
            <div className="grid grid-cols-2 gap-3 mb-4">
              {[
                {label:u.result.assetType,value:lang==='zh'?result.assetTypeZh:result.assetTypeEn,icon:'🏗️'},
                {label:u.result.issueType,value:lang==='zh'?result.issueTypeZh:result.issueTypeEn,icon:'🔍'},
                {label:u.result.location,value:lang==='zh'?result.locationZh:result.locationEn,icon:'📍'},
                {label:u.result.severity,value:<Badge type={result.severity}/>,icon:'⚠️'},
              ].map(({label,value,icon})=>(
                <div key={label} className="rounded-lg p-3" style={{background:'rgba(255,255,255,.7)',border:'1px solid #BFDBFE'}}>
                  <p className="text-xs text-slate-500 mb-1">{icon} {label}</p>
                  <div className="text-sm font-semibold text-slate-800">{value}</div>
                </div>
              ))}
            </div>
            <div className="rounded-lg p-4 mb-4" style={{background:sevColor[result.severity]+'18',border:`1px solid ${sevColor[result.severity]}50`}}>
              <p className="text-xs font-bold mb-1" style={{color:sevColor[result.severity]}}>💡 {u.result.aiExplain}</p>
              <p className="text-xs text-slate-700">{t.aiExplain[result.severity]}</p>
            </div>
            <div className="rounded-lg p-4 mb-4" style={{background:sevColor[result.severity]+'10',border:`1px solid ${sevColor[result.severity]}30`}}>
              <p className="text-xs font-bold mb-1" style={{color:sevColor[result.severity]}}>📋 {u.result.aiRec}</p>
              <p className="text-xs text-slate-700">{t.rec[result.severity]}</p>
            </div>
            <div className="rounded-lg p-3 mb-5" style={{background:'#0F172A'}}>
              <p className="text-xs font-semibold text-slate-400 mb-2">{u.result.jsonTitle}</p>
              <pre className="text-xs text-green-400" style={{lineHeight:1.6,overflowX:'auto'}}>{JSON.stringify({
                image: file?file.name:'(none)',
                text: desc||'',
                location: location?{latitude:location.latitude,longitude:location.longitude,address:location.address}:null,
                asset_type:lang==='zh'?result.assetTypeZh:result.assetTypeEn,
                issue_type:lang==='zh'?result.issueTypeZh:result.issueTypeEn,
                severity:result.severity,ai_location:lang==='zh'?result.locationZh:result.locationEn,confidence:result.confidence,
              },null,2)}</pre>
            </div>
            <button className="btn-primary w-full py-3 text-sm" onClick={handleGenReport}>{u.result.genReport}</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   MOCK MAP COMPONENT
═══════════════════════════════════════════════════════════ */
function MockMap({reports,highlight,onPinClick}){
  const {lang}=useContext(LangCtx);
  const sevColor={high:'#EF4444',medium:'#F59E0B',low:'#10B981'};
  const sevLabel={high:lang==='zh'?'高风险':'High',medium:lang==='zh'?'中风险':'Medium',low:lang==='zh'?'低风险':'Low'};
  const [popup,setPopup]=useState(null);
  const gridLines=[];
  for(let i=1;i<5;i++){
    gridLines.push(<div key={`h${i}`} className="map-grid-line" style={{top:`${i*20}%`,left:0,right:0,height:1}}/>);
    gridLines.push(<div key={`v${i}`} className="map-grid-line" style={{left:`${i*20}%`,top:0,bottom:0,width:1}}/>);
  }
  return(
    <div className="map-mock" style={{height:200,width:'100%',position:'relative'}} onClick={()=>setPopup(null)}>
      {gridLines}
      <div className="absolute inset-0 flex items-center justify-center" style={{opacity:.08}}>
        <span style={{fontSize:80}}>🗺️</span>
      </div>
      <div className="absolute top-2 left-2 bg-white rounded px-2 py-1 text-xs font-semibold text-slate-600 shadow" style={{border:'1px solid #E2E8F0'}}>
        {lang==='zh'?'华盛市基础设施分布图':'Huasheng City Infrastructure Map'}
      </div>
      {reports.map(rp=>(
        <div key={rp.id} style={{position:'absolute',left:`${rp.mapX||30}%`,top:`${rp.mapY||40}%`,transform:'translate(-50%,-100%)',zIndex:popup?.id===rp.id?5:1}}
          onClick={e=>{e.stopPropagation();setPopup(popup?.id===rp.id?null:rp);if(onPinClick)onPinClick(rp.id);}}>
          <div style={{width:14,height:14,borderRadius:'50%',background:sevColor[rp.severity],border:'2.5px solid #fff',boxShadow:'0 2px 8px rgba(0,0,0,.3)',opacity:highlight===rp.id||popup?.id===rp.id?1:0.75,transform:highlight===rp.id||popup?.id===rp.id?'scale(1.5)':'scale(1)',transition:'all .2s',cursor:'pointer'}}/>
          {(highlight===rp.id)&&(
            <div style={{background:'#1E293B',color:'#fff',fontSize:10,fontWeight:700,padding:'2px 6px',borderRadius:4,whiteSpace:'nowrap',marginTop:2,textAlign:'center'}}>
              {lang==='zh'?rp.locationZh:rp.locationEn}
            </div>
          )}
          {popup?.id===rp.id&&(
            <div className="map-popup">
              <p className="text-xs font-bold text-slate-900 mb-1">{lang==='zh'?rp.assetNameZh||rp.locationZh:rp.assetNameEn||rp.locationEn}</p>
              <div className="flex items-center gap-2 mb-1">
                <div className="w-2 h-2 rounded-full flex-shrink-0" style={{background:sevColor[rp.severity]}}/>
                <span className="text-xs font-semibold" style={{color:sevColor[rp.severity]}}>{sevLabel[rp.severity]}</span>
                <span className="text-xs text-slate-400">· {(rp.confidence*100).toFixed(0)}%</span>
              </div>
              <p className="text-xs text-slate-500">📍 {lang==='zh'?rp.locationZh:rp.locationEn}</p>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

        </div>
      </div>
    </>
  );
}

function GlobalSearch({records,onClose,dc,lang,t}){
  const [q,setQ]=useState('');
  const inputRef=useRef(null);
  useEffect(()=>{inputRef.current?.focus();},[]);
  useEffect(()=>{
    function onKey(e){if(e.key==='Escape')onClose();}
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[onClose]);
  function fuzzy(str,query){
    const s=str.toLowerCase(),qr=query.toLowerCase();
    let si=0;
    for(let qi=0;qi<qr.length;qi++){si=s.indexOf(qr[qi],si);if(si===-1)return false;si++;}
    return true;
  }
  const results=q.trim().length<2?[]:records.filter(r=>{
    const fields=[r.id,lang==='zh'?r.locationZh:r.locationEn,lang==='zh'?r.assetTypeZh:r.assetTypeEn,lang==='zh'?r.issueTypeZh:r.issueTypeEn];
    return fields.some(f=>fuzzy(f,q.trim()));
  }).slice(0,8);
  const sevColor={high:'#EF4444',medium:'#F59E0B',low:'#10B981'};
  return(
    <div className="gsearch-overlay" onClick={onClose}>
      <div className="gsearch-box" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-3 px-4 py-3" style={{borderBottom:'1px solid #F1F5F9'}}>
          <span className="text-slate-400">🔍</span>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)}
            className="flex-1 text-sm text-slate-900 outline-none bg-transparent"
            placeholder={dc.search.placeholder}/>
          <button className="text-xs text-slate-400 px-2 py-1 rounded bg-slate-100" onClick={onClose}>ESC</button>
        </div>
        <div className="max-h-80 overflow-y-auto">
          {q.trim().length>=2&&results.length===0&&(
            <div className="text-center py-8 text-slate-400 text-sm">{dc.search.noResult}</div>
          )}
          {results.map(r=>(
            <div key={r.id} className="px-4 py-3 flex items-center gap-3 hover:bg-slate-50 cursor-pointer" style={{borderBottom:'1px solid #F8FAFC'}}>
              <div className="w-2 h-2 rounded-full flex-shrink-0" style={{background:sevColor[r.severity]}}/>
              <div className="flex-1 min-w-0">
                <p className="text-xs font-bold text-slate-800">{r.id} · {lang==='zh'?r.assetTypeZh:r.assetTypeEn}</p>
                <p className="text-xs text-slate-500">{lang==='zh'?r.locationZh:r.locationEn} · {lang==='zh'?r.issueTypeZh:r.issueTypeEn}</p>
              </div>
              <Badge type={r.severity}/>
            </div>
          ))}
          {q.trim().length<2&&(
            <div className="px-4 py-6 text-center text-xs text-slate-400">{lang==='zh'?'输入至少2个字符开始搜索（支持模糊匹配）':'Type at least 2 characters to search (fuzzy match supported)'}</div>
          )}
        </div>
      </div>
    </div>
  );
}

function SkeletonRow({cols}){

        <td key={i} className="px-4 py-3">

}

  return(

      {/* Summary KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">

}

      </div>
      {showConfirm&&(
        <div className="modal-bg" onClick={()=>setShowConfirm(false)}>
          <div className="modal" style={{maxWidth:360}} onClick={e=>e.stopPropagation()}>
            <div className="p-6 text-center">
              <div className="text-4xl mb-3">🚪</div>
              <h3 className="text-base font-bold text-slate-900 mb-2">{p.logoutConfirm}</h3>
              <p className="text-xs text-slate-500 mb-5">{lang==='zh'?'您将退出当前登录状态，需要重新登录才能访问系统。':'You will be signed out and need to log in again to access the system.'}</p>
              <div className="flex gap-3">
                <button className="btn-ghost flex-1 py-2.5 text-sm justify-center" onClick={()=>setShowConfirm(false)}>{lang==='zh'?'取消':'Cancel'}</button>
                <button className="btn-primary flex-1 py-2.5 text-sm justify-center" style={{background:'#EF4444'}} onClick={()=>{setShowConfirm(false);onLogout();}}>{p.logout}</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════════ */
function App(){
  const [lang,setLang]=useState('zh');
  const t=I18N[lang];
  const [page,setPage]=useState('dashboard');
  const [reports,setReports]=useState(INIT_REPORTS);
  const [allDcRecords,setAllDcRecords]=useState(()=>generateAutoData());
  const [role,setRole]=useState('inspector');
  const [toast,setToast]=useState(null);
  const [globalSearchOpen,setGlobalSearchOpen]=useState(false);

  // ⌘K / Ctrl+K shortcut
  useEffect(()=>{
    function onKey(e){if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setGlobalSearchOpen(v=>!v);}}
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[]);

  function handleReportCreated(report){
    setReports(prev=>[report,...prev]);
    const sev=report.severity;
    const now=new Date();
    const dcRec={
      id:genDCId(),
      assetTypeZh:report.assetTypeZh,assetTypeEn:report.assetTypeEn,
      issueTypeZh:report.issueTypeZh,issueTypeEn:report.issueTypeEn,
      locationZh:report.locationZh,locationEn:report.locationEn,
      severity:sev,confidence:report.confidence,
      uploadTime:report.createdAt,source:'field',staffKey:'ZW',
      layer:'structured',
      quality:{completeness:95,confidence:Math.round(report.confidence*100),freshness:100},
      aiReasonZh:AI_REASONS_ZH[0],aiReasonEn:AI_REASONS_EN[0],
      decision:DECISIONS_BY_SEV[sev],
    };
    setAllDcRecords(prev=>[dcRec,...prev]);
    setPage('reports');
    setToast(t.toast.reportCreated);
  }

  function handleLogout(){
    setToast(t.toast.loggedOut);
    setTimeout(()=>setPage('dashboard'),1500);
  }

  function toggleLang(){setLang(l=>l==='zh'?'en':'zh');}

  return(
    <LangCtx.Provider value={{lang,t,setLang}}>
      <div className="flex" style={{minHeight:'100vh'}}>
        <Sidebar page={page} onNav={setPage} role={role} onRoleChange={setRole}/>
        <div className="flex-1 flex flex-col min-w-0" style={{marginLeft:224}}>
          <TopBar page={page} onLangToggle={toggleLang} onSearch={()=>setGlobalSearchOpen(true)}/>
          <main className="flex-1 overflow-y-auto">
            {page==='dashboard'&&<DashboardPage role={role}/>}
            {page==='upload'&&<UploadPage onReportCreated={handleReportCreated}/>}
            {page==='reports'&&<ReportsPage reports={reports} role={role}/>}
            {page==='datacenter'&&<DataCenterPage records={allDcRecords} role={role} globalSearchOpen={globalSearchOpen&&page==='datacenter'} onCloseGlobalSearch={()=>setGlobalSearchOpen(false)}/>}
            {page==='profile'&&<ProfilePage onLogout={handleLogout}/>}
            {/* Global search available from any page */}
            {globalSearchOpen&&page!=='datacenter'&&<GlobalSearch records={allDcRecords} onClose={()=>setGlobalSearchOpen(false)} dc={t.datacenter} lang={lang} t={t}/>}
          </main>
        </div>
        {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      </div>
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
